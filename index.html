<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Meal Planner">
<meta name="theme-color" content="#4a7c59">
<title>My Meal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,signInWithPopup,GoogleAuthProvider,signOut,updateProfile}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,setDoc,getDoc,collection,getDocs,deleteDoc}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const FC={apiKey:"AIzaSyACq6q9QppaOSLfzZe-ZXNUB9bATBjSd6E",authDomain:"my-meal-planner-ed514.firebaseapp.com",projectId:"my-meal-planner-ed514",storageBucket:"my-meal-planner-ed514.firebasestorage.app",messagingSenderId:"589856347741",appId:"1:589856347741:web:70fa752260096a93f4dfb4"};
const app=initializeApp(FC);
const auth=getAuth(app);
const db=getFirestore(app);
const gp=new GoogleAuthProvider();
async function fss(uid,col,id,d){await setDoc(doc(db,'users',uid,col,id),d)}
async function fsd(uid,col,id){await deleteDoc(doc(db,'users',uid,col,id))}
async function fsg(uid,col){const s=await getDocs(collection(db,'users',uid,col));return s.docs.map(d=>({...d.data()}))}
async function fsms(uid,d){await setDoc(doc(db,'users',uid,'meta','settings'),d)}
async function fsgm(uid){const s=await getDoc(doc(db,'users',uid,'meta','settings'));return s.exists()?s.data():null}
const DR={id:'r1',name:'Club Sandwich',emoji:'🥪',cat:'Lunch',time:15,servings:2,ingredients:[{name:'Bread',qty:4,unit:'slices'},{name:'Chicken Breast',qty:150,unit:'g'},{name:'Lettuce',qty:2,unit:'pcs'},{name:'Tomato',qty:1,unit:'pcs'},{name:'Mayonnaise',qty:20,unit:'g'}],notes:'Toast bread. Layer chicken, lettuce, tomato and mayo. Cut diagonally.',youtubeId:null,youtubeUrl:'',createdAt:Date.now()};
const DI=[{id:'i1',name:'Bread',cat:'Grain',qty:8,unit:'slices',min:2,slInclude:true,nutrition:null},{id:'i2',name:'Chicken Breast',cat:'Meat',qty:300,unit:'g',min:100,slInclude:true,nutrition:null},{id:'i3',name:'Lettuce',cat:'Vegetables',qty:4,unit:'pcs',min:2,slInclude:true,nutrition:null},{id:'i4',name:'Tomato',cat:'Vegetables',qty:3,unit:'pcs',min:2,slInclude:true,nutrition:null},{id:'i5',name:'Mayonnaise',cat:'Other',qty:150,unit:'g',min:30,slInclude:true,nutrition:null}];
async function seedU(uid){await fss(uid,'recipes','r1',DR);for(const i of DI)await fss(uid,'inventory',i.id,i);await fsms(uid,{seeded:true,customCalGoal:null});}
async function loadU(uid){
  showLoad('Loading your meal planner…');
  try{
    const[recipes,inventory,meals,meta]=await Promise.all([fsg(uid,'recipes'),fsg(uid,'inventory'),fsg(uid,'meals'),fsgm(uid)]);
    if(!meta||!meta.seeded){await seedU(uid);ST.recipes=[{...DR}];ST.inventory=DI.map(i=>({...i}));ST.meals=[];ST.customCalGoal=null;}
    else{ST.recipes=recipes;ST.inventory=inventory;ST.meals=meals;ST.customCalGoal=meta.customCalGoal||null;}
    nid.r=Math.max(0,...ST.recipes.map(r=>parseInt((r.id||'').replace(/\D/g,''))||0))+1;
    nid.i=Math.max(0,...ST.inventory.map(i=>parseInt((i.id||'').replace(/\D/g,''))||0))+1;
    nid.m=Math.max(0,...ST.meals.map(m=>parseInt((m.id||'').replace(/\D/g,''))||0))+1;
    hideLoad();nav('dashboard');
  }catch(e){console.error(e);hideLoad();authErr('Failed to load data. Please refresh.');}
}
onAuthStateChanged(auth,user=>{
  if(user){
    ST.user=user;
    const av=document.getElementById('uav');
    if(av){if(user.photoURL){av.style.backgroundImage=`url(${user.photoURL})`;av.textContent='';}else{av.style.backgroundImage='';av.textContent=(user.displayName||user.email)[0].toUpperCase();}}
    loadU(user.uid);
  }else{ST.user=null;showAuth();}
});
window.doSignIn=async()=>{
  const e=v('ae'),p=v('ap');if(!e||!p){authErr('Enter email and password');return;}
  btnLoad(true);try{await signInWithEmailAndPassword(auth,e,p);}catch(er){btnLoad(false);authErr(ferr(er.code));}
};
window.doRegister=async()=>{
  const n=v('an'),e=v('ae'),p=v('ap'),p2=v('ap2');
  if(!n){authErr('Enter your name');return;}if(!e||!p){authErr('Enter email and password');return;}
  if(p!==p2){authErr('Passwords do not match');return;}if(p.length<6){authErr('Password must be 6+ characters');return;}
  btnLoad(true);try{const c=await createUserWithEmailAndPassword(auth,e,p);await updateProfile(c.user,{displayName:n});}catch(er){btnLoad(false);authErr(ferr(er.code));}
};
window.doGoogle=async()=>{btnLoad(true);try{await signInWithPopup(auth,gp);}catch(er){btnLoad(false);if(er.code!=='auth/popup-closed-by-user')authErr(ferr(er.code));}};
window.doSignOut=async()=>{if(!confirm('Sign out of My Meal Planner?'))return;await signOut(auth);};
function ferr(c){return({'auth/user-not-found':'No account with this email.','auth/wrong-password':'Incorrect password.','auth/email-already-in-use':'Email already registered.','auth/invalid-email':'Invalid email address.','auth/weak-password':'Password too weak — use 6+ characters.','auth/too-many-requests':'Too many attempts. Please try again later.','auth/invalid-credential':'Incorrect email or password.'})[c]||'Something went wrong. Please try again.'}
window.persist=async(col,id,d)=>{if(!ST.user)return;if(col==='settings')await fsms(ST.user.uid,{seeded:true,customCalGoal:ST.customCalGoal});else if(col&&id&&d)await fss(ST.user.uid,col,String(id),d);};
window.pdel=async(col,id)=>{if(ST.user)await fsd(ST.user.uid,col,String(id));};
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#faf8f4;color:#1e1e1e;display:flex;flex-direction:column}
:root{--sage:#4a7c59;--sl:#e8f0eb;--sm:#c2d9c9;--terra:#c4623a;--tl:#faeee8;--ink:#1e1e1e;--im:#555;--il:#888;--bd:rgba(0,0,0,0.09);--wh:#fff;--gold:#d4a843;--gl:#fdf3dc;--red:#c44;--rl:#fee;--pu:#534AB7;--pl:#EEEDFE;--bl:#185FA5;--bll:#E6F1FB;--cr:#faf8f4}

/* ── APP WRAPPER ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOP BAR ── */
#topbar{flex-shrink:0;background:var(--wh);border-bottom:1px solid var(--bd);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;z-index:10}
#topbar-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--sage)}
#uav{width:34px;height:34px;border-radius:50%;background:var(--sage);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0;background-size:cover;background-position:center}

/* ── MAIN SCROLL AREA ── */
#page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 80px}

/* ── BOTTOM NAV ── */
#bnav{flex-shrink:0;background:var(--wh);border-top:1px solid var(--bd);height:60px;display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom,0)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--il);font-size:10px;font-weight:500;border:none;background:none;padding:0;transition:color .15s}
.bni.on{color:var(--sage)}
.bni-ic{font-size:20px;line-height:1}

/* ── AUTH SCREEN ── */
#auth{display:none;position:fixed;inset:0;background:var(--cr);z-index:100;overflow-y:auto;padding:20px}
#auth.on{display:flex;align-items:center;justify-content:center}
.abox{background:var(--wh);border-radius:20px;border:1px solid var(--bd);padding:32px 24px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.alogo{text-align:center;margin-bottom:24px}
.alogo-e{font-size:44px;margin-bottom:6px}
.alogo-n{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--sage)}
.alogo-s{font-size:13px;color:var(--il);margin-top:2px}
.atabs{display:flex;gap:4px;background:#f0ede8;border-radius:10px;padding:4px;margin-bottom:20px}
.atab{flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;color:var(--im);text-align:center;user-select:none;transition:all .15s}
.atab.on{background:var(--wh);color:var(--ink)}
.afg{margin-bottom:13px}
.albl{display:block;font-size:11px;font-weight:500;color:var(--im);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.ainp{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--cr);outline:none;-webkit-appearance:none}
.ainp:focus{border-color:var(--sage);background:var(--wh)}
.abtn{width:100%;padding:12px;border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;background:var(--sage);color:white;margin-top:4px;transition:all .15s}
.abtn:disabled{opacity:.6;cursor:not-allowed}
.adiv{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--il);font-size:12px}
.adiv::before,.adiv::after{content:'';flex:1;height:1px;background:var(--bd)}
.agbtn{width:100%;padding:11px;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:1.5px solid var(--bd);background:var(--wh);color:var(--ink);display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s}
.agbtn:hover{background:var(--sl)}
.aerr{background:var(--rl);color:var(--red);border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:12px;display:none}
.aerr.on{display:block}

/* ── LOADING ── */
#load{display:none;position:fixed;inset:0;background:var(--cr);z-index:90;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#load.on{display:flex}
.spin{width:36px;height:36px;border:3px solid var(--sm);border-top-color:var(--sage);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── CARDS ── */
.card{background:var(--wh);border-radius:14px;border:1px solid var(--bd);padding:18px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.pt{font-family:'Fraunces',serif;font-size:22px;font-weight:600}
.sdiv{font-size:11px;font-weight:500;color:var(--il);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px}
.sbar{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
@media(min-width:500px){.sbar{grid-template-columns:repeat(4,1fr)}}
.stc{background:var(--wh);border-radius:12px;border:1px solid var(--bd);padding:12px}
.stn{font-family:'Fraunces',serif;font-size:24px;font-weight:600}
.stl{font-size:11px;color:var(--il);margin-top:2px}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;font-weight:500;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--sage);color:white}.bp:hover{background:#3d6b4c}
.bs{background:var(--wh);color:var(--ink);border:1px solid var(--bd)}.bs:hover{background:var(--sl)}
.bd_{background:var(--rl);color:var(--red);border:1px solid var(--rl)}
.bg{background:var(--gl);color:#7a5a0a;border:1px solid #e6c96a}
.bsm{padding:5px 10px;font-size:12px;border-radius:6px}

/* ── TAGS & BADGES ── */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.tg{background:var(--sl);color:var(--sage)}.to{background:var(--tl);color:var(--terra)}.tgo{background:var(--gl);color:var(--gold)}.tp{background:var(--pl);color:var(--pu)}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:500}
.bok{background:var(--sl);color:var(--sage)}.blow{background:var(--gl);color:var(--gold)}.bout{background:var(--rl);color:var(--red)}.bbl{background:var(--bll);color:var(--bl)}

/* ── RECIPE CARDS ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.rc{background:var(--wh);border-radius:14px;border:1px solid var(--bd);overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.rc:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.rth{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.rbdy{padding:12px}
.rn{font-family:'Fraunces',serif;font-size:14px;font-weight:500;margin-bottom:4px}
.rmeta{font-size:11px;color:var(--il);margin-bottom:6px}
.ract{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}

/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;font-weight:500;color:var(--il);padding:7px 10px;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.4px}
.tbl td{padding:10px;border-bottom:1px solid rgba(0,0,0,0.04);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.sbr{height:5px;border-radius:3px;background:var(--bd);overflow:hidden;width:70px;display:inline-block}
.sf{height:100%;border-radius:3px}
.sok{background:var(--sage)}.slow{background:var(--gold)}.sout{background:var(--red)}

/* ── CALENDAR ── */
.cgd{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.chd{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cdn{text-align:center;font-size:10px;font-weight:500;color:var(--il);padding:3px}
.cc{background:var(--wh);border:1px solid var(--bd);border-radius:8px;padding:6px 4px;min-height:64px;cursor:pointer;transition:background .15s}
.cc:hover{background:var(--sl)}
.cc.td{border-color:var(--sage);border-width:2px}
.cc.om{opacity:.35}
.cnum{font-size:11px;font-weight:500;color:var(--im);margin-bottom:3px}
.cc.td .cnum{color:var(--sage);font-weight:700}
.chip{font-size:9px;background:var(--sl);color:var(--sage);border-radius:3px;padding:1px 3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;cursor:pointer}
.chip.lunch{background:var(--gl);color:var(--gold)}.chip.dinner{background:var(--tl);color:var(--terra)}
.cnav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cnbtn{background:var(--wh);border:1px solid var(--bd);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.cml{font-family:'Fraunces',serif;font-size:18px;font-weight:500}

/* ── MODALS ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.modal{background:var(--wh);border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:sup .22s ease}
@media(min-width:600px){.ov{align-items:center}.modal{border-radius:18px;max-height:85vh}}
@keyframes sup{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhdl{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 18px}
.mtl{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin-bottom:18px}
.fg{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:500;color:var(--im);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.inp{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--cr);outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--sage);background:var(--wh)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mact{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* ── NUTRITION BARS ── */
.mbw{margin-bottom:10px}
.mlr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.mbar{height:7px;border-radius:4px;background:#f0ede8;overflow:hidden}
.mfill{height:100%;border-radius:4px}
.mc{background:#d4a843}.mp{background:#4a7c59}.mf_{background:#c4623a}.mfi{background:#534AB7}
.tabs{display:flex;gap:4px;background:#f0ede8;border-radius:10px;padding:4px;margin-bottom:16px;width:fit-content}
.tab{padding:6px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;color:var(--im)}
.tab.on{background:var(--wh);color:var(--ink)}
.ngd{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
@media(min-width:500px){.ngd{grid-template-columns:repeat(3,1fr)}}
.nmc{background:var(--wh);border-radius:10px;border:1px solid var(--bd);padding:12px}
.nmn{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.nml{font-size:11px;color:var(--il);margin-top:1px}
.nms{font-size:10px;margin-top:3px}
.rrow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.05);font-size:12px}
.rrow:last-child{border-bottom:none}
.rpct{font-weight:500;min-width:38px;text-align:right}
.rok{color:var(--sage)}.rover{color:var(--red)}.rlow{color:var(--gold)}

/* ── SHOPPING ── */
.sli{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.sli:last-child{border-bottom:none}
.sli.ck .sln{text-decoration:line-through;color:var(--il)}
.sln{font-size:14px;font-weight:500}
.sqin{width:60px;padding:4px 7px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cr);outline:none;text-align:center}
.tbdg{padding:2px 7px;border-radius:10px;font-size:11px;background:#f0ede8;color:var(--im)}
.udot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.ucrit{background:var(--red)}.ulow{background:var(--gold)}

/* ── DETAIL ── */
.dpane{background:var(--wh);border-radius:14px;border:1px solid var(--bd);padding:20px}
.iirow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.04);font-size:14px}
.iirow:last-child{border-bottom:none}
.sind{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.siok{background:var(--sage)}.silow{background:var(--gold)}.siout{background:var(--red)}

/* ── ING PICKER ── */
.ipi{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:10px;margin-bottom:5px;cursor:pointer;border:1.5px solid var(--bd);background:var(--wh)}
.ipi.sel{border-color:var(--sage);background:var(--sl)}
.ipi:hover{background:var(--sl)}

/* ── SETTINGS ── */
.dac{background:var(--wh);border-radius:12px;border:1px solid var(--bd);padding:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.dat{font-size:14px;font-weight:500}
.dad{font-size:12px;color:var(--il);margin-top:3px}

/* ── CATEGORY PILLS ── */
.cpills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cpill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--bd);background:var(--wh);color:var(--im);user-select:none}
.cpill.on{border-color:var(--sage);background:var(--sl);color:var(--sage)}

/* ── TOAST ── */
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1e1e1e;color:white;padding:10px 18px;border-radius:50px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:88vw;text-align:center}
#toast.on{opacity:1}

/* ── ING ROW ── */
.irow{display:flex;gap:6px;align-items:center;margin-bottom:7px;background:var(--cr);border-radius:9px;padding:7px 9px;border:1px solid var(--bd)}
.irow .inp{flex:2;background:transparent;border:none;padding:3px 0;font-size:14px;outline:none}
.irow .iq{width:65px;background:transparent;border:1px solid var(--bd);border-radius:6px;font-size:13px;padding:3px 7px}
.irow .iu{width:65px;background:transparent;border:1px solid var(--bd);border-radius:6px;font-size:13px;padding:3px 7px}
.rmb{background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:0 3px;flex-shrink:0}
</style>
</head>
<body>
<div id="auth" class="on">
  <div class="abox">
    <div class="alogo"><div class="alogo-e">🥗</div><div class="alogo-n">My Meal Planner</div><div class="alogo-s">Plan smarter. Eat better.</div></div>
    <div class="atabs"><div class="atab on" id="t-in" onclick="stab('in')">Sign In</div><div class="atab" id="t-reg" onclick="stab('reg')">Register</div></div>
    <div class="aerr" id="aerr"></div>
    <div id="anw" style="display:none"><div class="afg"><label class="albl">Your Name</label><input class="ainp" id="an" type="text" placeholder="e.g. Ahmad" autocomplete="name"></div></div>
    <div class="afg"><label class="albl">Email Address</label><input class="ainp" id="ae" type="email" placeholder="you@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('ap').focus()"></div>
    <div class="afg"><label class="albl">Password</label><input class="ainp" id="ap" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')hmain()"></div>
    <div class="afg" id="ap2w" style="display:none"><label class="albl">Confirm Password</label><input class="ainp" id="ap2" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <button class="abtn" id="amainbtn" onclick="hmain()">Sign In</button>
    <div class="adiv">or</div>
    <button class="agbtn" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
  </div>
</div>

<div id="load"><div style="font-size:44px;margin-bottom:4px">🥗</div><div class="spin"></div><div style="font-size:13px;color:var(--il)" id="ltxt">Loading…</div></div>

<div id="app" style="display:none">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:20px">🥗</span>
      <span id="topbar-title" style="font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--sage)">Dashboard</span>
    </div>
    <div id="uav" onclick="doSignOut()" title="Tap to sign out"></div>
  </div>
  <div id="page"></div>
  <div id="bnav">
    <button class="bni on" id="bn-dashboard" onclick="nav('dashboard')"><span class="bni-ic">🏠</span>Home</button>
    <button class="bni" id="bn-recipes" onclick="nav('recipes')"><span class="bni-ic">📖</span>Recipes</button>
    <button class="bni" id="bn-inventory" onclick="nav('inventory')"><span class="bni-ic">🥕</span>Pantry</button>
    <button class="bni" id="bn-nutrition" onclick="nav('nutrition')"><span class="bni-ic">📊</span>Nutrition</button>
    <button class="bni" id="bn-shopping" onclick="nav('shopping')"><span class="bni-ic">🛒</span>Shopping</button>
    <button class="bni" id="bn-data" onclick="nav('data')"><span class="bni-ic">⚙️</span>Settings</button>
  </div>
</div>

<!-- RECIPE MODAL -->
<div class="ov" id="rmod">
  <div class="modal">
    <div class="mhdl"></div>
    <div class="mtl" id="rmtl">✨ New Recipe</div>
    <div class="fr"><div class="fg"><label class="lbl">Name</label><input class="inp" id="rn" placeholder="e.g. Nasi Lemak"></div><div class="fg"><label class="lbl">Emoji</label><input class="inp" id="re" placeholder="🍛" maxlength="2"></div></div>
    <div class="fr"><div class="fg"><label class="lbl">Category</label><select class="inp" id="rc"><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option><option>Dessert</option></select></div><div class="fg"><label class="lbl">Prep Time (min)</label><input class="inp" id="rt" type="number" placeholder="30"></div></div>
    <div class="fg"><label class="lbl">Servings</label><input class="inp" id="rs" type="number" placeholder="2" style="width:90px"></div>
    <div class="fg">
      <label class="lbl">Ingredients</label>
      <div id="ingc"></div>
      <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
        <button class="btn bs bsm" onclick="openIngPicker()">🥕 Add from Pantry</button>
        <button class="btn bs bsm" onclick="addIngManual()" style="color:var(--il)">+ Add manually</button>
      </div>
    </div>
    <div class="fg"><label class="lbl">Instructions</label><textarea class="inp" id="rnotes" rows="3" placeholder="Brief instructions..."></textarea></div>
    <div class="fg"><label class="lbl">YouTube Link <span style="font-weight:400;text-transform:none;font-size:11px;color:var(--il)">(optional)</span></label><input class="inp" id="ryt" placeholder="Paste YouTube URL..."></div>
    <div class="mact"><button class="btn bs" onclick="closeM('rmod')">Cancel</button><button class="btn bp" onclick="saveRecipe()">Save Recipe</button></div>
  </div>
</div>

<!-- INGREDIENT PICKER MODAL -->
<div class="ov" id="ipmod">
  <div class="modal">
    <div class="mhdl"></div>
    <div class="mtl">🥕 Add Ingredient</div>
    <input class="inp" id="ipsearch" placeholder="Search pantry…" oninput="filterIP(this.value)" style="margin-bottom:10px">
    <div class="cpills" id="ipcats"></div>
    <div id="iplist" style="max-height:220px;overflow-y:auto;margin-bottom:12px"></div>
    <div id="ipform" style="display:none;background:var(--cr);border-radius:10px;padding:12px">
      <div style="font-size:13px;font-weight:500;margin-bottom:10px" id="ipselname">Selected: —</div>
      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
        <div style="flex:1;min-width:80px"><label class="lbl" style="font-size:10px">Quantity</label><input class="inp" id="ipqty" type="number" placeholder="e.g. 200" min="0"></div>
        <div style="flex:1;min-width:80px"><label class="lbl" style="font-size:10px">Unit</label><input class="inp" id="ipunit" placeholder="g / ml / pcs"></div>
        <button class="btn bp bsm" onclick="confirmIP()" style="margin-bottom:1px">Add</button>
      </div>
    </div>
    <div class="mact"><button class="btn bs" onclick="closeM('ipmod')">Cancel</button></div>
  </div>
</div>

<!-- INVENTORY MODAL -->
<div class="ov" id="imod">
  <div class="modal">
    <div class="mhdl"></div>
    <div class="mtl" id="imtl">🥕 Add Item</div>
    <div class="fr"><div class="fg"><label class="lbl">Item Name</label><input class="inp" id="in_" placeholder="e.g. HL Full Cream Milk"></div><div class="fg"><label class="lbl">Category</label><select class="inp" id="ic"><option>Meat</option><option>Vegetables</option><option>Dairy</option><option>Grain</option><option>Spices</option><option>Drinks</option><option>Other</option></select></div></div>
    <div class="fr"><div class="fg"><label class="lbl">Quantity</label><input class="inp" id="iq_" type="number" placeholder="5"></div><div class="fg"><label class="lbl">Unit</label><input class="inp" id="iu_" placeholder="pcs / g / ml"></div></div>
    <div class="fg"><label class="lbl">Min Stock (reorder alert)</label><input class="inp" id="imin" type="number" placeholder="2" style="width:100px"></div>
    <div class="fg"><label class="lbl">Shopping List</label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--im)"><input type="checkbox" id="isl" checked style="width:15px;height:15px;accent-color:var(--sage)">Auto-add at ≤20% stock</label>
    </div>
    <div style="border-top:1px solid var(--bd);margin:14px 0;padding-top:14px">
      <div style="font-size:13px;font-weight:500;margin-bottom:3px">📊 Nutrition Facts <span style="font-weight:400;color:var(--il);font-size:11px">(per 100g or 100ml — optional)</span></div>
      <div style="font-size:11px;color:var(--il);margin-bottom:10px">Enter values from the product packaging for accurate nutrition tracking.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px">
        <div><label class="lbl" style="font-size:10px">Calories (kcal)</label><input class="inp" id="ncal" type="number" placeholder="—" min="0" step="0.1"></div>
        <div><label class="lbl" style="font-size:10px">Carbs (g)</label><input class="inp" id="ncarb" type="number" placeholder="—" min="0" step="0.1"></div>
        <div><label class="lbl" style="font-size:10px">Protein (g)</label><input class="inp" id="nprot" type="number" placeholder="—" min="0" step="0.1"></div>
        <div><label class="lbl" style="font-size:10px">Fat (g)</label><input class="inp" id="nfat" type="number" placeholder="—" min="0" step="0.1"></div>
        <div><label class="lbl" style="font-size:10px">Fiber (g)</label><input class="inp" id="nfib" type="number" placeholder="—" min="0" step="0.1"></div>
        <div><label class="lbl" style="font-size:10px">Sodium (mg)</label><input class="inp" id="nsod" type="number" placeholder="—" min="0" step="0.1"></div>
      </div>
    </div>
    <div class="mact"><button class="btn bs" onclick="closeM('imod')">Cancel</button><button class="btn bp" onclick="saveInv()">Save Item</button></div>
  </div>
</div>

<!-- PLAN MEAL MODAL -->
<div class="ov" id="pmod">
  <div class="modal">
    <div class="mhdl"></div>
    <div class="mtl">📅 Plan a Meal</div>
    <div class="fg"><label class="lbl">Date</label><input class="inp" id="pd" type="date"></div>
    <div class="fg"><label class="lbl">Meal Type</label><select class="inp" id="pt"><option value="breakfast">🌅 Breakfast</option><option value="lunch">☀️ Lunch</option><option value="dinner">🌙 Dinner</option></select></div>
    <div class="fg"><label class="lbl">Recipe</label><select class="inp" id="pr" onchange="showPCheck(this.value)"></select></div>
    <div id="pcheck" style="margin-top:10px"></div>
    <div class="mact"><button class="btn bs" onclick="closeM('pmod')">Cancel</button><button class="btn bp" onclick="confirmPlan()">Plan & Deduct Pantry</button></div>
  </div>
</div>

<div id="toast"></div>
<script>
// ── NUTRITION DB ──────────────────────────────────────────────
const NDB={'Bread':{cal:265,carb:49,protein:9,fat:3.2,fiber:2.7,sodium:491},'Chicken Breast':{cal:165,carb:0,protein:31,fat:3.6,fiber:0,sodium:74},'Lettuce':{cal:15,carb:2.9,protein:1.4,fat:0.2,fiber:1.3,sodium:28},'Tomato':{cal:18,carb:3.9,protein:0.9,fat:0.2,fiber:1.2,sodium:5},'Mayonnaise':{cal:680,carb:0.6,protein:1,fat:75,fiber:0,sodium:635},'Rice':{cal:130,carb:28,protein:2.7,fat:0.3,fiber:0.4,sodium:1},'Eggs':{cal:155,carb:1.1,protein:13,fat:11,fiber:0,sodium:124},'Onion':{cal:40,carb:9,protein:1.1,fat:0.1,fiber:1.7,sodium:4},'Garlic':{cal:149,carb:33,protein:6.4,fat:0.5,fiber:2.1,sodium:17},'Soy Sauce':{cal:53,carb:4.9,protein:8.1,fat:0.1,fiber:0.8,sodium:5720},'Coconut Milk':{cal:230,carb:5.5,protein:2.3,fat:24,fiber:2.2,sodium:15},'Noodles':{cal:138,carb:25,protein:4.5,fat:2,fiber:1.5,sodium:400},'Tofu':{cal:76,carb:1.9,protein:8,fat:4.8,fiber:0.3,sodium:7},'Potato':{cal:77,carb:17,protein:2,fat:0.1,fiber:2.2,sodium:6},'Milk':{cal:61,carb:4.8,protein:3.2,fat:3.3,fiber:0,sodium:44},'Butter':{cal:717,carb:0.1,protein:0.9,fat:81,fiber:0,sodium:714},'Flour':{cal:364,carb:76,protein:10,fat:1,fiber:2.7,sodium:2},'Sugar':{cal:387,carb:100,protein:0,fat:0,fiber:0,sodium:1},'Salt':{cal:0,carb:0,protein:0,fat:0,fiber:0,sodium:38758},'Olive Oil':{cal:884,carb:0,protein:0,fat:100,fiber:0,sodium:2}};
const UC={g:1,ml:1,kg:1000,l:1000,pcs:100,piece:100,slices:30,slice:30,cloves:5,clove:5,pinch:1,tbsp:15,tsp:5,cup:240};
const RDA={cal:2000,carb:300,protein:55,fat:67,fiber:25,sodium:2000};

// ── STATE ─────────────────────────────────────────────────────
const ST={page:'dashboard',user:null,recipes:[],inventory:[],meals:[],customCalGoal:null,calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),selRec:null,nutTab:'today',slCk:{},slQty:{},rfilt:'all',invCat:'All',_atab:'in'};
const nid={r:1,i:1,m:1};
let ingRows=[];let ipSel=null;let ipCat='All';let charts={};

// ── UI HELPERS ────────────────────────────────────────────────
function v(id){return document.getElementById(id)?.value?.trim()||'';}
function el(id){return document.getElementById(id);}
function showAuth(){el('auth').classList.add('on');el('load').classList.remove('on');el('app').style.display='none';}
function showLoad(t='Loading…'){el('ltxt').textContent=t;el('load').classList.add('on');el('auth').classList.remove('on');el('app').style.display='none';}
function hideLoad(){el('load').classList.remove('on');el('app').style.display='flex';}
function authErr(m){const e=el('aerr');e.textContent=m;e.classList.add('on');}
function btnLoad(on){const b=el('amainbtn');b.disabled=on;b.textContent=on?'Please wait…':(ST._atab==='reg'?'Create Account':'Sign In');}
function stab(t){
  ST._atab=t;
  el('t-in').classList.toggle('on',t==='in');
  el('t-reg').classList.toggle('on',t==='reg');
  el('anw').style.display=t==='reg'?'block':'none';
  el('ap2w').style.display=t==='reg'?'block':'none';
  el('amainbtn').textContent=t==='reg'?'Create Account':'Sign In';
  el('aerr').classList.remove('on');
  btnLoad(false);
}
function hmain(){ST._atab==='reg'?doRegister():doSignIn();}
function toast(m){const t=el('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2800);}
function openM(id){el(id).classList.add('on');}
function closeM(id){el(id).classList.remove('on');}

// ── NAVIGATION ────────────────────────────────────────────────
function nav(p){
  ST.page=p;ST.selRec=null;
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));
  const bn=el('bn-'+p);if(bn)bn.classList.add('on');
  const titles={dashboard:'Dashboard',recipes:'Recipes',inventory:'Pantry',nutrition:'Nutrition',shopping:'Shopping',data:'Settings'};
  el('topbar-title').textContent=titles[p]||p;
  render();
  el('page').scrollTop=0;
}

// ── NUTRITION HELPERS ─────────────────────────────────────────
function getN(name,qty,unit){
  const inv=ST.inventory.find(i=>i.name.toLowerCase()===name.toLowerCase());
  const db=inv&&inv.nutrition&&inv.nutrition.cal!=null?inv.nutrition:NDB[name];
  if(!db)return null;
  const f=(UC[unit]||100)*qty/100;
  return{cal:(db.cal||0)*f,carb:(db.carb||0)*f,protein:(db.protein||0)*f,fat:(db.fat||0)*f,fiber:(db.fiber||0)*f,sodium:(db.sodium||0)*f};
}
function calcRN(r){
  let t={cal:0,carb:0,protein:0,fat:0,fiber:0,sodium:0};let cov=0;
  r.ingredients.forEach(ing=>{const n=getN(ing.name,ing.qty,ing.unit);if(n){cov++;Object.keys(t).forEach(k=>t[k]+=n[k]||0);}});
  const p=r.servings||1;Object.keys(t).forEach(k=>t[k]=t[k]/p);
  return{...t,covered:cov,total:r.ingredients.length};
}
function calcDN(ds){
  const meals=ST.meals.filter(m=>m.date===ds);
  let t={cal:0,carb:0,protein:0,fat:0,fiber:0,sodium:0};
  meals.forEach(m=>{const r=ST.recipes.find(r=>r.id===m.recipeId);if(r){const n=calcRN(r);Object.keys(t).forEach(k=>t[k]+=n[k]||0);}});
  return t;
}
function effRDA(){const b={...RDA};if(ST.customCalGoal&&ST.customCalGoal>0)b.cal=ST.customCalGoal;return b;}
function mbr(lbl,val,max,unit,cls){
  const pct=Math.min(100,Math.round(val/max*100));const ov=val>max;
  return`<div class="mbw"><div class="mlr"><span style="color:var(--im)">${lbl}</span><span style="color:${ov?'var(--red)':'var(--il)'}">${Math.round(val)}${unit}/${max}${unit}</span></div><div class="mbar"><div class="mfill ${cls}" style="width:${pct}%;${ov?'background:var(--red)':''}"></div></div></div>`;
}

// ── INVENTORY HELPERS ─────────────────────────────────────────
function getInv(name){return ST.inventory.find(i=>i.name.toLowerCase()===name.toLowerCase());}
function stStat(item){return item.qty<=0?'out':item.qty<item.min?'low':'ok';}
function stPct(item){return Math.min(100,Math.round(item.qty/(item.min*3)*100));}
function stPer(item){const f=item.min*5;return f>0?Math.round(item.qty/f*100):100;}
function hasAll(r){return r.ingredients.every(ing=>{const inv=getInv(ing.name);return inv&&inv.qty>=ing.qty;});}
function buildSL(){
  return ST.inventory.filter(i=>i.slInclude&&stPer(i)<=20)
    .map(i=>{const sp=stPer(i);const urg=i.qty<=0||sp<=10?'crit':'low';const sq=Math.round(i.min*5-i.qty);return{...i,sp,urg,sq:Math.max(sq,i.min)};})
    .sort((a,b)=>(a.urg==='crit'?0:1)-(b.urg==='crit'?0:1));
}

// ── MISC HELPERS ──────────────────────────────────────────────
function greet(){const h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening';}
function fmtDate(s){return new Date(s+'T00:00:00').toLocaleDateString('en-SG',{weekday:'short',month:'short',day:'numeric'});}
function catClr(c){return{Breakfast:'#fdf3dc',Lunch:'#e8f0eb',Dinner:'#faeee8',Snack:'#f5e8fa',Dessert:'#fce8e8'}[c]||'#f5f5f5';}
function catTag(c){return c==='Breakfast'||c==='Snack'?'tgo':c==='Lunch'?'tg':c==='Dinner'?'to':'tg';}
function ytId(url){
  if(!url)return null;
  const ps=[/youtu\.be\/([a-zA-Z0-9_-]{11})/,/youtube\.com\/watch\?.*v=([a-zA-Z0-9_-]{11})/,/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/];
  for(const p of ps){const m=url.match(p);if(m)return m[1];}return null;
}

// ── MAIN RENDER ───────────────────────────────────────────────
function render(){
  const pg=el('page');if(!pg)return;
  if(ST.page==='dashboard')pg.innerHTML=rdash();
  else if(ST.page==='recipes')pg.innerHTML=ST.selRec?rdet():rrec();
  else if(ST.page==='inventory')pg.innerHTML=rinv();
  else if(ST.page==='nutrition')pg.innerHTML=rnut();
  else if(ST.page==='shopping')pg.innerHTML=rshop();
  else if(ST.page==='data')pg.innerHTML=rdata();
  if(ST.page==='nutrition')setTimeout(initCharts,100);
}

// ── DASHBOARD ─────────────────────────────────────────────────
function rdash(){
  const low=ST.inventory.filter(i=>stStat(i)!=='ok');
  const sl=buildSL();
  const td=new Date().toISOString().slice(0,10);
  const tm=ST.meals.filter(m=>m.date===td);
  const te=new Date(td+'T23:59:59');
  const wm=ST.meals.filter(m=>{if(m.date===td)return false;const d=new Date(m.date+'T00:00:00');return d>te&&d<=new Date(Date.now()+7*86400000);});
  const tn=calcDN(td);const rda=effRDA();
  const un=ST.user?.displayName||ST.user?.email?.split('@')[0]||'Chef';
  return`<div class="ph"><div class="pt">Good ${greet()}, ${un}! 👨‍🍳</div><button class="btn bp bsm" onclick="openPlanMod()">+ Plan Meal</button></div>
  <div class="sbar">
    <div class="stc"><div class="stn">${ST.recipes.length}</div><div class="stl">Recipes</div></div>
    <div class="stc"><div class="stn">${ST.inventory.length}</div><div class="stl">Pantry</div></div>
    <div class="stc"><div class="stn" style="color:${low.length>0?'var(--terra)':'var(--sage)'}">${low.length}</div><div class="stl">Low stock</div></div>
    <div class="stc" style="cursor:pointer" onclick="nav('shopping')"><div class="stn" style="color:${sl.length>0?'var(--terra)':'var(--sage)'}">${sl.length}</div><div class="stl">To buy 🛒</div></div>
  </div>

    ${r.youtubeId?`<div class="sdiv">📺 Video Tutorial</div><a href="https://www.youtube.com/watch?v=${r.youtubeId}" target="_blank" rel="noopener" style="display:block;text-decoration:none"><div style="position:relative;width:100%;border-radius:12px;overflow:hidden;background:#000;cursor:pointer"><img src="https://img.youtube.com/vi/${r.youtubeId}/hqdefault.jpg" style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover;opacity:.9"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:50px;height:50px;background:rgba(255,0,0,.9);border-radius:50%;display:flex;align-items:center;justify-content:center"><div style="width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:18px solid white;margin-left:4px"></div></div></div></div></a><a href="https://www.youtube.com/watch?v=${r.youtubeId}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--terra);text-decoration:none;font-weight:500;margin-top:6px">▶ Open in YouTube ↗</a>`:''}
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-weight:500;margin-bottom:10px">Nutrition per serving</div>
    <div style="font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--sage)">${Math.round(n.cal)} <span style="font-size:12px;font-weight:400;color:var(--il)">kcal</span></div>
    <div style="margin-top:10px">${mbr('Carbs',n.carb,rda.carb,'g','mfill mc')}${mbr('Protein',n.protein,rda.protein,'g','mfill mp')}${mbr('Fat',n.fat,rda.fat,'g','mfill mf_')}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px;font-size:12px"><div style="background:var(--cr);border-radius:8px;padding:8px"><div style="color:var(--il)">Sodium</div><div style="font-weight:500">${Math.round(n.sodium)}mg</div></div><div style="background:var(--cr);border-radius:8px;padding:8px"><div style="color:var(--il)">Fiber</div><div style="font-weight:500">${Math.round(n.fiber)}g</div></div></div>
    ${n.covered<n.total?`<div style="font-size:11px;color:var(--il);margin-top:8px">⚠ ${n.total-n.covered} ingredient(s) missing nutrition data</div>`:''}
  </div>
  <div class="card">
    <div style="font-weight:500;margin-bottom:10px">Pantry Availability</div>
    ${r.ingredients.map(ing=>{const inv=getInv(ing.name);const ok=inv&&inv.qty>=ing.qty;return`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px"><span>${ing.name}</span><span class="badge ${ok?'bok':inv?'blow':'bout'}">${ok?'✓ Ready':inv?'Low':'✗ Missing'}</span></div>`;}).join('')}
    <div style="margin-top:12px">${hasAll(r)?`<button class="btn bp" style="width:100%" onclick="openPlanFor('${r.id}')">📅 Plan this meal</button>`:`<button class="btn bs" style="width:100%" onclick="nav('shopping')">🛒 Go to shopping list</button>`}</div>

// ── INVENTORY PAGE ────────────────────────────────────────────

      <td><label style="display:flex;align-items:center;gap:3px;cursor:pointer"><input type="checkbox" ${i.slInclude?'checked':''} onchange="toggleSL('${i.id}',this.checked)" style="accent-color:var(--sage)"><span class="badge bbl" style="font-size:10px">${stPer(i)}%</span></label></td>
      <td><div style="display:flex;gap:4px"><button class="btn bs bsm" onclick="openEditInv('${i.id}')">✏️</button><button class="btn bd_ bsm" onclick="delInv('${i.id}')">🗑</button></div></td>

<script>
// ── CALENDAR PAGE ─────────────────────────────────────────────
function rcal(){
  const{calYear:y,calMonth:m}=ST;
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const fd=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();const td=new Date();
  let cells=[];const pd=new Date(y,m,0).getDate();
  for(let i=fd-1;i>=0;i--)cells.push({day:pd-i,cur:false});
  for(let d=1;d<=dim;d++)cells.push({day:d,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-dim-fd+2,cur:false});
  return`<div class="ph"><div class="pt">Calendar</div><button class="btn bp bsm" onclick="openPlanMod()">+ Plan</button></div>
  <div class="cnav"><button class="cnbtn" onclick="prevM()">←</button><div class="cml">${months[m]} ${y}</div><button class="cnbtn" onclick="nextM()">→</button></div>
  <div class="chd">${['S','M','T','W','T','F','S'].map(d=>`<div class="cdn">${d}</div>`).join('')}</div>
  <div class="cgd">${cells.map(c=>{
    const ds=c.cur?`${y}-${String(m+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`:'' ;
    const dm=c.cur?ST.meals.filter(ml=>ml.date===ds):[];
    const it=c.cur&&td.getFullYear()===y&&td.getMonth()===m&&td.getDate()===c.day;
    const dn=c.cur&&dm.length?calcDN(ds):null;
    return`<div class="cc ${it?'td':''} ${!c.cur?'om':''}" onclick="${c.cur?`openPlanDate('${ds}')`:''}"">
      <div class="cnum">${c.day}</div>
      ${dm.map(ml=>{const r=ST.recipes.find(r=>r.id===ml.recipeId);return r?`<div class="chip ${ml.type}" onclick="event.stopPropagation();goRec('${r.id}')" title="${r.name}">${r.emoji} ${r.name}</div>`:''}).join('')}
      ${dn?`<div style="font-size:9px;color:var(--il)">🔥${Math.round(dn.cal)}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}
function prevM(){ST.calMonth--;if(ST.calMonth<0){ST.calMonth=11;ST.calYear--;}render();}
function nextM(){ST.calMonth++;if(ST.calMonth>11){ST.calMonth=0;ST.calYear++;}render();}

// ── NUTRITION PAGE ────────────────────────────────────────────
function rnut(){
  const td=new Date().toISOString().slice(0,10);const tab=ST.nutTab;const rda=effRDA();
  let ma=[];
  if(tab==='today')ma=ST.meals.filter(m=>m.date===td);
  else if(tab==='week'){const wa=new Date();wa.setDate(wa.getDate()-7);ma=ST.meals.filter(m=>new Date(m.date+'T00:00:00')>=wa);}
  else ma=[...ST.meals];
  let tn={cal:0,carb:0,protein:0,fat:0,fiber:0,sodium:0};
  ma.forEach(m=>{const r=ST.recipes.find(r=>r.id===m.recipeId);if(r){const n=calcRN(r);Object.keys(tn).forEach(k=>tn[k]+=n[k]||0);}});
  const days=tab==='week'?7:tab==='all'?Math.max(1,ma.length||1):1;
  const daily=tab==='today'?{...tn}:{};
  if(tab!=='today')Object.keys(tn).forEach(k=>daily[k]=tn[k]/days);
  const isc=!!ST.customCalGoal;const cg=ST.customCalGoal||2000;
  function nmc(val,lbl,cur,max,unit,icc){
    const pct=max?Math.min(200,Math.round((cur||0)/max*100)):null;
    const col=pct?pct>110?'var(--red)':pct<60?'var(--gold)':'var(--sage)':'var(--sage)';
    return`<div class="nmc"><div class="nmn" style="color:${col}">${val}</div><div class="nml">${lbl}</div>${max?`<div class="nms" style="color:${col}">${pct}% of ${max}${unit}${icc?' (your goal)':''}</div>`:''}</div>`;
  }
  return`<div class="ph"><div class="pt">Nutrition</div></div>
  <div class="card" style="margin-bottom:16px;border:${isc?'1.5px solid var(--sage)':'1px solid var(--bd)'}">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div><div style="font-weight:500;font-size:13px;margin-bottom:2px">🎯 Daily Calorie Goal</div><div style="font-size:11px;color:var(--il)">HPB Singapore Adult guidelines</div></div>
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        <input id="cgi" type="number" class="inp" style="width:95px;font-size:14px;font-weight:500;text-align:center" placeholder="2000" value="${isc?cg:''}" min="500" max="9999">
        <span style="font-size:12px;color:var(--im)">kcal</span>
        <button class="btn bp bsm" onclick="saveCalGoal()">Set</button>
        ${isc?`<button class="btn bs bsm" onclick="resetCalGoal()">Reset</button>`:''}
      </div>
    </div>
    ${isc?`<div style="margin-top:10px;font-size:11px;background:var(--sl);border-radius:7px;padding:7px 10px;color:var(--sage)">✅ Your goal: <strong>${cg} kcal/day</strong> (SG default: 2,000 kcal)</div>`:`<div style="margin-top:10px;font-size:11px;color:var(--il)">Default: <strong>2,000 kcal/day</strong> (HPB Singapore Adult)</div>`}
  </div>
  <div class="tabs"><div class="tab ${tab==='today'?'on':''}" onclick="ST.nutTab='today';render()">Today</div><div class="tab ${tab==='week'?'on':''}" onclick="ST.nutTab='week';render()">7-day avg</div><div class="tab ${tab==='all'?'on':''}" onclick="ST.nutTab='all';render()">All meals</div></div>
  <div class="ngd">
    ${nmc(Math.round(daily.cal||0),'Calories (kcal)',daily.cal,rda.cal,'kcal',isc)}
    ${nmc(Math.round(daily.carb||0)+'g','Carbohydrates',daily.carb,rda.carb,'g',false)}
    ${nmc(Math.round(daily.protein||0)+'g','Protein',daily.protein,rda.protein,'g',false)}
    ${nmc(Math.round(daily.fat||0)+'g','Total Fat',daily.fat,rda.fat,'g',false)}
    ${nmc(Math.round(daily.fiber||0)+'g','Dietary Fiber',daily.fiber,rda.fiber,'g',false)}
    ${nmc(Math.round(daily.sodium||0)+'mg','Sodium',daily.sodium,rda.sodium,'mg',false)}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
    <div class="card"><div style="font-weight:500;font-size:13px;margin-bottom:12px">Macros breakdown</div><div style="position:relative;height:180px"><canvas id="ndnut"></canvas></div><div id="ndleg" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;font-size:10px;color:var(--im)"></div></div>
    <div class="card"><div style="font-weight:500;font-size:13px;margin-bottom:12px">vs. SG Adult (HPB)</div>${['cal','carb','protein','fat','fiber','sodium'].map(k=>{const val=daily[k]||0;const max=rda[k];const pct=Math.min(200,Math.round(val/max*100));const st=pct>110?'rover':pct<60?'rlow':'rok';const lb={cal:'Cal',carb:'Carbs',protein:'Protein',fat:'Fat',fiber:'Fiber',sodium:'Sodium'};return`<div class="rrow"><span>${lb[k]}${k==='cal'&&isc?` <span class="badge bok" style="font-size:9px">custom</span>`:''}</span><div class="mbar" style="width:70px;margin:0 7px"><div class="mfill ${k==='carb'?'mc':k==='protein'?'mp':k==='fat'?'mf_':'mfi'}" style="width:${Math.min(100,pct)}%;${pct>110?'background:var(--red)':pct<60?'background:var(--gold)':''}"></div></div><span class="${st} rpct">${pct}%</span></div>`;}).join('')}</div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
    <div class="card"><div style="font-weight:500;font-size:13px;margin-bottom:12px">7-day trend</div><div style="position:relative;height:160px"><canvas id="ntrnd"></canvas></div></div>
    <div class="card"><div style="font-weight:500;font-size:13px;margin-bottom:12px">Avg by meal type</div><div style="position:relative;height:160px"><canvas id="nmtyp"></canvas></div></div>
  </div>
  <div class="sdiv">Recipe Nutrition (per serving)</div>
  <div class="card" style="overflow-x:auto"><table class="tbl" style="table-layout:auto"><thead><tr><th>Recipe</th><th>kcal</th><th>Carbs</th><th>Protein</th><th>Fat</th><th>Sodium</th></tr></thead><tbody>${ST.recipes.map(r=>{const n=calcRN(r);return`<tr><td style="font-weight:500;white-space:nowrap;font-size:13px">${r.emoji} ${r.name}</td><td>${Math.round(n.cal)}</td><td>${Math.round(n.carb)}g</td><td>${Math.round(n.protein)}g</td><td>${Math.round(n.fat)}g</td><td>${Math.round(n.sodium)}mg</td></tr>`;}).join('')}</tbody></table></div>`;
}

function saveCalGoal(){const inp=el('cgi');if(!inp)return;const val=parseInt(inp.value);if(val>=500&&val<=9999){ST.customCalGoal=val;persist('settings');toast(`✅ Goal set to ${val} kcal`);render();}else toast('Enter 500–9999 kcal');}
function resetCalGoal(){ST.customCalGoal=null;persist('settings');toast('Reset to 2,000 kcal');render();}

function initCharts(){
  const td=new Date().toISOString().slice(0,10);const tab=ST.nutTab;
  let ma=[];
  if(tab==='today')ma=ST.meals.filter(m=>m.date===td);
  else if(tab==='week'){const wa=new Date();wa.setDate(wa.getDate()-7);ma=ST.meals.filter(m=>new Date(m.date+'T00:00:00')>=wa);}
  else ma=[...ST.meals];
  let tn={cal:0,carb:0,protein:0,fat:0,fiber:0};
  const days=tab==='week'?7:tab==='all'?Math.max(1,ma.length||1):1;
  ma.forEach(m=>{const r=ST.recipes.find(r=>r.id===m.recipeId);if(r){const n=calcRN(r);Object.keys(tn).forEach(k=>tn[k]+=n[k]||0);}});
  if(tab!=='today')Object.keys(tn).forEach(k=>tn[k]=tn[k]/days);
  const cc=tn.carb*4,pc=tn.protein*4,fc=tn.fat*9,fic=tn.fiber*2;
  if(charts.d)charts.d.destroy();
  const dc=el('ndnut');
  if(dc){charts.d=new Chart(dc,{type:'doughnut',data:{labels:['Carbs','Protein','Fat','Fiber'],datasets:[{data:[Math.round(cc),Math.round(pc),Math.round(fc),Math.round(fic)],backgroundColor:['#d4a843','#4a7c59','#c4623a','#534AB7'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}});const lg=el('ndleg');if(lg)lg.innerHTML=[['Carbs','#d4a843',cc],['Protein','#4a7c59',pc],['Fat','#c4623a',fc],['Fiber','#534AB7',fic]].map(([l,c,v])=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:2px;background:${c}"></span>${l} ${Math.round(v)}kcal</span>`).join('');}
  const last7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last7.push(d.toISOString().slice(0,10));}
  const tdata=last7.map(d=>Math.round(calcDN(d).cal));const rda=effRDA();
  if(charts.t)charts.t.destroy();
  const tc=el('ntrnd');
  if(tc){charts.t=new Chart(tc,{type:'bar',data:{labels:last7.map(d=>new Date(d+'T00:00:00').toLocaleDateString('en-SG',{weekday:'short',day:'numeric'})),datasets:[{label:'kcal',data:tdata,backgroundColor:'#4a7c59',borderRadius:3,maxBarThickness:20},{type:'line',label:'Target',data:Array(7).fill(rda.cal),borderColor:'#d4a843',borderWidth:1.5,borderDash:[4,4],pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9},autoSkip:false,maxRotation:0}},y:{ticks:{font:{size:9}},grid:{color:'rgba(0,0,0,0.04)'}}}}});}
  const mtc=['breakfast','lunch','dinner'].map(type=>{let c=0;const ms=ST.meals.filter(m=>m.type===type);ms.forEach(m=>{const r=ST.recipes.find(r=>r.id===m.recipeId);if(r)c+=calcRN(r).cal||0;});return Math.round(c/Math.max(1,ms.length));});
  if(charts.mt)charts.mt.destroy();
  const mc=el('nmtyp');
  if(mc){charts.mt=new Chart(mc,{type:'bar',data:{labels:['Breakfast','Lunch','Dinner'],datasets:[{data:mtc,backgroundColor:['#d4a843','#4a7c59','#c4623a'],borderRadius:5,maxBarThickness:40}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11}}},y:{ticks:{font:{size:9}},grid:{color:'rgba(0,0,0,0.04)'}}}}});}
}

// ── SHOPPING PAGE ─────────────────────────────────────────────
function rshop(){
  const list=buildSL();const crit=list.filter(i=>i.urg==='crit').length;const ckd=list.filter(i=>ST.slCk[i.id]).length;const cats=[...new Set(list.map(i=>i.cat))];
  return`<div class="ph"><div class="pt">Shopping List</div><div style="display:flex;gap:6px"><button class="btn bs bsm" onclick="copySL()">📋 Copy</button><button class="btn bg bsm" onclick="restockCkd()">✓ Restock</button></div></div>
  <div class="sbar" style="grid-template-columns:repeat(3,1fr)">
    <div class="stc"><div class="stn" style="color:${list.length>0?'var(--terra)':'var(--sage)'}">${list.length}</div><div class="stl">To buy</div></div>
    <div class="stc"><div class="stn" style="color:${crit>0?'var(--red)':'var(--sage)'}">${crit}</div><div class="stl">Critical</div></div>

  ${list.length===0?`<div style="text-align:center;padding:40px;color:var(--il)"><div style="font-size:36px;margin-bottom:8px">🎉</div><div style="font-family:'Fraunces',serif;font-size:17px;font-weight:500;margin-bottom:4px">All stocked up!</div><div style="font-size:13px">No items below 20% stock.</div></div>`:`
  <div style="display:flex;justify-content:flex-end;gap:6px;margin-bottom:10px">
    <button class="btn bs bsm" onclick="ckAll()">Check all</button>
    <button class="btn bs bsm" onclick="clrCk()">Clear</button>
  </div>
  <div class="card">${cats.map(cat=>{const items=list.filter(i=>i.cat===cat);return`<div style="margin-bottom:16px"><div style="font-size:11px;font-weight:500;color:var(--il);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${cat} (${items.length})</div>${items.map(item=>{const ck=!!ST.slCk[item.id];const ov=ST.slQty[item.id]!==undefined?ST.slQty[item.id]:item.sq;return`<div class="sli ${ck?'ck':''}"><input type="checkbox" style="width:16px;height:16px;accent-color:var(--sage);cursor:pointer;flex-shrink:0" ${ck?'checked':''} onchange="tglCk('${item.id}')"><div style="flex:1;min-width:0"><div class="sln"><span class="udot ${item.urg==='crit'?'ucrit':'ulow'}"></span>${item.name}</div><div style="font-size:11px;color:var(--il)">${item.qty<=0?'Out of stock':`${item.sp}% left · ${item.qty} ${item.unit}`}</div></div><div style="display:flex;align-items:center;gap:5px;flex-shrink:0"><input type="number" class="sqin" value="${ov}" min="0" onchange="ST.slQty['${item.id}']=parseFloat(this.value)||0"><span style="font-size:11px;color:var(--il)">${item.unit}</span></div></div>`;}).join('')}</div>`;}).join('')}</div>`}
  <div class="sdiv">All tracked items</div>
  <div class="card">${ST.inventory.map(i=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.04)"><div style="display:flex;align-items:center;gap:7px"><input type="checkbox" ${i.slInclude?'checked':''} onchange="toggleSL('${i.id}',this.checked)" style="accent-color:var(--sage);width:14px;height:14px"><span style="font-size:13px">${i.name}</span><span class="tag tg" style="font-size:10px">${i.cat}</span></div><div style="display:flex;align-items:center;gap:6px"><span class="tbdg">${stPer(i)}%</span><span class="badge ${stStat(i)==='ok'?'bok':stStat(i)==='low'?'blow':'bout'}" style="font-size:10px">${i.qty} ${i.unit}</span></div></div>`).join('')}</div>`;
}

// ── SETTINGS PAGE ─────────────────────────────────────────────
function rdata(){
  const kb=(JSON.stringify({r:ST.recipes,i:ST.inventory,m:ST.meals}).length/1024).toFixed(1);

  </div>
  <div class="sdiv">Backup</div>

    <div style="display:flex;justify-content:space-between"><span style="color:var(--il)">Account</span><span style="font-weight:500">${ST.user?.email||''}</span></div>
  </div></div>`;
}
</script>
<script>
// ── RECIPE ACTIONS ────────────────────────────────────────────
function addIngRow(name='',qty='',unit=''){
  const id='ir'+Date.now()+Math.random().toString(36).slice(2);ingRows.push(id);
  const div=document.createElement('div');div.className='irow';div.id=id;
  div.innerHTML=`<input class="inp" placeholder="Ingredient" value="${name}"><input class="iq" type="number" placeholder="Qty" value="${qty}" min="0"><input class="iu" placeholder="Unit" value="${unit}"><button class="rmb" onclick="rmIng('${id}')">×</button>`;
  el('ingc').appendChild(div);
}
function addIngManual(){addIngRow();}
function rmIng(id){el(id)?.remove();ingRows=ingRows.filter(r=>r!==id);}
function getIngRows(){
  const rows=el('ingc').querySelectorAll('.irow');const ings=[];
  rows.forEach(row=>{const inputs=row.querySelectorAll('input');if(inputs.length>=3){const n=inputs[0].value.trim(),q=parseFloat(inputs[1].value),u=inputs[2].value.trim();if(n)ings.push({name:n,qty:q||1,unit:u||'pcs'});}});
  return ings;
}
function openNewRec(){
  el('rmod')._eid=null;el('rmtl').textContent='✨ New Recipe';
  ingRows=[];el('ingc').innerHTML='';
  ['rn','re','rt','rnotes','ryt'].forEach(id=>el(id).value='');
  el('rs').value='2';el('rc').value='Lunch';
  openM('rmod');
}
function openEditRec(id){
  const r=ST.recipes.find(r=>r.id===id);if(!r)return;
  el('rmod')._eid=id;el('rmtl').textContent='✏️ Edit Recipe';
  el('rn').value=r.name||'';el('re').value=r.emoji||'';el('rc').value=r.cat||'Lunch';
  el('rt').value=r.time||'';el('rs').value=r.servings||2;
  el('rnotes').value=r.notes||'';el('ryt').value=r.youtubeUrl||'';
  ingRows=[];el('ingc').innerHTML='';
  (r.ingredients||[]).forEach(ing=>addIngRow(ing.name,ing.qty,ing.unit));
  openM('rmod');
}
async function saveRecipe(){
  const name=v('rn');if(!name){toast('Please enter a recipe name');return;}
  const ingredients=getIngRows();
  const ytRaw=v('ryt');const yid=ytId(ytRaw);
  const eid=el('rmod')._eid;
  if(eid){
    const idx=ST.recipes.findIndex(r=>r.id===eid);
    if(idx>-1){
      ST.recipes[idx]={...ST.recipes[idx],name,emoji:v('re')||'🍽',cat:el('rc').value,time:parseInt(v('rt'))||30,servings:parseInt(v('rs'))||2,ingredients,notes:v('rnotes'),youtubeId:yid,youtubeUrl:ytRaw};
      if(ST.selRec&&ST.selRec.id===eid)ST.selRec=ST.recipes[idx];
      await persist('recipes',eid,ST.recipes[idx]);
    }
    el('rmod')._eid=null;toast('Recipe updated ✅');
  }else{
    const nid_r='r'+nid.r++;
    const rec={id:nid_r,name,emoji:v('re')||'🍽',cat:el('rc').value,time:parseInt(v('rt'))||30,servings:parseInt(v('rs'))||2,ingredients,notes:v('rnotes'),youtubeId:yid,youtubeUrl:ytRaw,createdAt:Date.now()};
    ST.recipes.push(rec);await persist('recipes',nid_r,rec);toast('Recipe saved 🎉');
  }
  closeM('rmod');render();
}
async function delRec(id){
  if(!confirm('Delete this recipe?'))return;
  ST.recipes=ST.recipes.filter(r=>r.id!==id);ST.selRec=null;
  await pdel('recipes',id);toast('Recipe deleted');render();
}
function selRec(id){ST.selRec=ST.recipes.find(r=>r.id===id);render();}
function goRec(id){ST.selRec=ST.recipes.find(r=>r.id===id);document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));el('bn-recipes')?.classList.add('on');el('topbar-title').textContent='Recipes';ST.page='recipes';render();el('page').scrollTop=0;}

// ── INGREDIENT PICKER ─────────────────────────────────────────
function openIngPicker(){
  ipCat='All';ipSel=null;el('ipsearch').value='';el('ipform').style.display='none';
  el('ipselname').textContent='Selected: —';
  renderIPCats();renderIPList('');openM('ipmod');
}
function renderIPCats(){
  const cats=['All','Meat','Vegetables','Dairy','Grain','Spices','Drinks','Other'];
  el('ipcats').innerHTML=cats.map(cat=>`<div class="cpill ${ipCat===cat?'on':''}" onclick="ipCat='${cat}';renderIPList(el('ipsearch').value)">${cat}</div>`).join('');
}
function filterIP(q){renderIPList(q);}
function renderIPList(q=''){
  renderIPCats();
  const items=ST.inventory.filter(i=>(ipCat==='All'||i.cat===ipCat)&&(!q||i.name.toLowerCase().includes(q.toLowerCase())));
  const container=el('iplist');
  if(items.length===0){container.innerHTML=`<div style="text-align:center;padding:16px;color:var(--il);font-size:13px">No items found. <span onclick="closeM('ipmod');openNewInv()" style="color:var(--sage);cursor:pointer;text-decoration:underline">Add to pantry first</span></div>`;return;}
  container.innerHTML=items.map(i=>{
    const sel=ipSel&&ipSel.id===i.id;const st=stStat(i);
    return`<div class="ipi ${sel?'sel':''}" onclick="selIP('${i.id}')">
      <div><div style="font-size:14px;font-weight:500">${i.name}</div><div style="font-size:11px;color:var(--il)">${i.cat} · ${i.qty} ${i.unit}</div></div>
      <div style="display:flex;align-items:center;gap:6px"><span class="badge ${st==='ok'?'bok':st==='low'?'blow':'bout'}" style="font-size:10px">${st==='ok'?'✓':st==='low'?'Low':'Out'}</span>${sel?`<span style="color:var(--sage);font-weight:600">✓</span>`:''}</div>
    </div>`;
  }).join('');
}
function selIP(id){
  ipSel=ST.inventory.find(i=>i.id===id);if(!ipSel)return;
  el('ipselname').textContent=ipSel.name;
  el('ipunit').value=ipSel.unit||'';el('ipqty').value='';
  el('ipform').style.display='block';
  renderIPList(el('ipsearch').value);
}
function confirmIP(){
  if(!ipSel){toast('Please select an ingredient');return;}
  const qty=parseFloat(el('ipqty').value);const unit=v('ipunit');
  if(!qty||qty<=0){toast('Please enter a quantity');return;}
  addIngRow(ipSel.name,qty,unit||ipSel.unit);
  ipSel=null;el('ipform').style.display='none';el('ipselname').textContent='Selected: —';
  closeM('ipmod');
}

// ── INVENTORY ACTIONS ─────────────────────────────────────────
function getNF(){return{cal:parseFloat(el('ncal')?.value)||null,carb:parseFloat(el('ncarb')?.value)||null,protein:parseFloat(el('nprot')?.value)||null,fat:parseFloat(el('nfat')?.value)||null,fiber:parseFloat(el('nfib')?.value)||null,sodium:parseFloat(el('nsod')?.value)||null};}
function setNF(n){const ids={cal:'ncal',carb:'ncarb',protein:'nprot',fat:'nfat',fiber:'nfib',sodium:'nsod'};Object.entries(ids).forEach(([k,id])=>{const e=el(id);if(e)e.value=(n&&n[k]!=null)?n[k]:'';});}
function openNewInv(){
  el('imtl').textContent='🥕 Add Item';
  ['in_','iq_','iu_','imin'].forEach(id=>{const e=el(id);if(e)e.value='';});
  const cb=el('isl');if(cb)cb.checked=true;
  el('imod')._eid=null;setNF(null);openM('imod');
}
function openEditInv(id){
  const item=ST.inventory.find(i=>i.id===id);if(!item)return;
  el('imtl').textContent='✏️ Edit Item';
  el('in_').value=item.name;el('ic').value=item.cat;
  el('iq_').value=item.qty;el('iu_').value=item.unit;el('imin').value=item.min;
  const cb=el('isl');if(cb)cb.checked=item.slInclude!==false;
  el('imod')._eid=item.id;setNF(item.nutrition||null);openM('imod');
}
async function saveInv(){
  const name=v('in_');const qty=parseFloat(el('iq_')?.value);const unit=v('iu_');const min=parseFloat(el('imin')?.value)||1;const cat=el('ic').value;const sl=el('isl')?.checked!==false;
  const nraw=getNF();const nutrition=nraw.cal!=null?{...nraw,_source:'manual'}:null;
  if(!name||isNaN(qty)){toast('Please fill in name and quantity');return;}
  const eid=el('imod')._eid;
  if(eid){
    const item=ST.inventory.find(i=>i.id===eid);
    if(item){Object.assign(item,{name,qty,unit:unit||'pcs',min,cat,slInclude:sl,nutrition});await persist('inventory',eid,item);toast('Item updated ✓');}
    el('imod')._eid=null;
  }else{
    const ex=ST.inventory.find(i=>i.name.toLowerCase()===name.toLowerCase());
    if(ex){ex.qty+=qty;if(nutrition)ex.nutrition=nutrition;await persist('inventory',ex.id,ex);toast(`Added ${qty} ${unit||'pcs'} to ${name}`);}
    else{const nid_i='i'+nid.i++;const item={id:nid_i,name,cat,qty,unit:unit||'pcs',min,slInclude:sl,nutrition};ST.inventory.push(item);await persist('inventory',nid_i,item);toast('Item added ✓');}
  }
  closeM('imod');render();
}
async function delInv(id){
  if(!confirm('Remove this item?'))return;
  ST.inventory=ST.inventory.filter(i=>i.id!==id);
  await pdel('inventory',id);toast('Item removed');render();
}
async function toggleSL(id,val){
  const item=ST.inventory.find(i=>i.id===id);
  if(item){item.slInclude=val;await persist('inventory',item.id,item);}
  render();
}

// ── MEAL PLAN ACTIONS ─────────────────────────────────────────
function openPlanMod(){el('pd').value=new Date().toISOString().slice(0,10);popRecSel();el('pcheck').innerHTML='';openM('pmod');}
function openPlanDate(date){el('pd').value=date;popRecSel();el('pcheck').innerHTML='';openM('pmod');}
function openPlanFor(rid){el('pd').value=new Date().toISOString().slice(0,10);popRecSel(rid);openM('pmod');}
function popRecSel(sid){
  const sel=el('pr');
  const av=ST.recipes.filter(r=>hasAll(r));const un=ST.recipes.filter(r=>!hasAll(r));
  let html='';
  if(av.length>0){html+=`<optgroup label="✅ Can Cook (${av.length})">`;html+=av.map(r=>`<option value="${r.id}" ${r.id===sid?'selected':''}>${r.emoji} ${r.name}</option>`).join('');html+=`</optgroup>`;}
  if(un.length>0){html+=`<optgroup label="⚠ Missing Ingredients">`;html+=un.map(r=>`<option value="${r.id}" disabled style="color:#aaa">${r.emoji} ${r.name}</option>`).join('');html+=`</optgroup>`;}
  if(av.length===0)html=`<option disabled selected>No recipes with sufficient ingredients</option>`;
  sel.innerHTML=html;
  if(sid&&av.find(r=>r.id===sid))sel.value=sid;
  else if(av.length>0&&!sid)sel.value=av[0].id;
  const cur=sel.value;if(cur&&av.find(r=>r.id===cur))showPCheck(cur);
}
function showPCheck(rid){
  const r=ST.recipes.find(r=>r.id===rid);if(!r)return;
  const n=calcRN(r);
  el('pcheck').innerHTML=`<div style="font-size:11px;font-weight:500;color:var(--im);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">Ingredient Check</div>`+r.ingredients.map(ing=>{const inv=getInv(ing.name);const ok=inv&&inv.qty>=ing.qty;return`<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span>${ing.name} (${ing.qty} ${ing.unit})</span><span class="badge ${ok?'bok':inv?'blow':'bout'}">${ok?'✓':inv?`${inv.qty}${inv.unit}`:'✗'}</span></div>`;}).join('')+`<div style="margin-top:8px;padding:8px;background:var(--cr);border-radius:8px;font-size:12px"><span style="font-weight:500">🔥 ${Math.round(n.cal)} kcal</span> · ${Math.round(n.protein)}g protein · ${Math.round(n.carb)}g carbs</div>`;
}
async function confirmPlan(){
  const date=v('pd');const type=el('pt').value;const rid=el('pr').value;
  const r=ST.recipes.find(r=>r.id===rid);if(!r)return;
  let missing=[];
  for(const ing of r.ingredients){const inv=getInv(ing.name);if(inv){inv.qty=Math.max(0,inv.qty-ing.qty);await persist('inventory',inv.id,inv);}else missing.push(ing.name);}
  const nid_m='m'+nid.m++;const meal={id:nid_m,date,type,recipeId:rid};
  ST.meals.push(meal);await persist('meals',nid_m,meal);
  closeM('pmod');toast(`✓ ${r.name} planned · ${Math.round(calcRN(r).cal)} kcal${missing.length?' · Missing: '+missing.slice(0,2).join(', '):''}`);render();
}
async function delMeal(id){ST.meals=ST.meals.filter(m=>m.id!==id);await pdel('meals',id);toast('Meal removed');render();}

// ── SHOPPING ACTIONS ──────────────────────────────────────────
function tglCk(id){ST.slCk[id]=!ST.slCk[id];render();}
function clrCk(){ST.slCk={};render();}
function ckAll(){buildSL().forEach(i=>{ST.slCk[i.id]=true;});render();}
async function restockCkd(){
  const list=buildSL();let count=0;
  for(const item of list){if(ST.slCk[item.id]){const inv=ST.inventory.find(i=>i.id===item.id);const qty=parseFloat(ST.slQty[item.id])||item.sq;if(inv){inv.qty+=qty;await persist('inventory',inv.id,inv);count++;}}}
  if(count===0){toast('No items checked');return;}
  ST.slCk={};ST.slQty={};toast(`✓ Restocked ${count} item${count>1?'s':''}!`);render();
}
function copySL(){
  const list=buildSL();if(list.length===0){toast('List is empty');return;}
  const cats=[...new Set(list.map(i=>i.cat))];
  let text='🛒 Shopping List\n'+'─'.repeat(20)+'\n';
  cats.forEach(cat=>{text+=`\n${cat.toUpperCase()}\n`;list.filter(i=>i.cat===cat).forEach(i=>{const qty=ST.slQty[i.id]||i.sq;text+=`${ST.slCk[i.id]?'[x]':'[ ]'} ${i.name} — ${qty} ${i.unit}\n`;});});
  text+=`\nGenerated: ${new Date().toLocaleDateString('en-SG')}`;
  navigator.clipboard.writeText(text).then(()=>toast('📋 Copied!')).catch(()=>toast('Copy failed'));
}

// ── EXPORT / IMPORT ───────────────────────────────────────────
function expData(){
  const data={version:'2.2.0',exportedAt:new Date().toISOString(),recipes:ST.recipes,inventory:ST.inventory,meals:ST.meals,settings:{customCalGoal:ST.customCalGoal}};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`meal-planner-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);toast('✅ Exported!');
}
async function impData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.recipes||!data.inventory){toast('❌ Invalid file');return;}
      if(!confirm(`Import from ${file.name}?\nRecipes: ${data.recipes.length} · Inventory: ${data.inventory.length}\n\nMerges with existing data.`))return;
      for(const r of data.recipes){if(!ST.recipes.find(x=>x.id===r.id)){ST.recipes.push(r);await persist('recipes',r.id,r);}}
      for(const i of data.inventory){if(!ST.inventory.find(x=>x.id===i.id)){ST.inventory.push(i);await persist('inventory',i.id,i);}}
      for(const m of data.meals||[]){if(!ST.meals.find(x=>x.id===m.id)){ST.meals.push(m);await persist('meals',m.id,m);}}
      toast('✅ Imported!');render();
    }catch(err){toast('❌ Failed: '+err.message);}
  };
  reader.readAsText(file);input.value='';
}
</script>
